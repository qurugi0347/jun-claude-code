name: Deploy to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  version-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update package.json version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/v}
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "$TAG_NAME" ]; then
            echo "Version already $TAG_NAME, skipping update"
            exit 0
          fi
          npm version $TAG_NAME --no-git-tag-version
          git config --global user.email "qurugi0347@gmail.com"
          git config --global user.name "qurugi0347"
          git add package.json
          git commit -m "${GITHUB_REF#refs/tags/}"
          git pull --rebase origin main
          git push origin HEAD:main

  publish:
    needs: version-update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
